<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo Personalizável com Vídeos</title>
    <style>
        /* Estiliza o vídeo para cobrir todo o fundo */
        video.background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;  /* Garante que o vídeo cubra a tela sem distorcer */
            z-index: -1;  /* Faz o vídeo ficar atrás do conteúdo */
        }

        /* Estilo do conteúdo sobre o vídeo */
        h1 {
            color: black;
            font-size: 3em;
            position: relative;
            z-index: 1;
            text-align: center;
            margin-top: 20%;
        }

        p {
            color: black;
            position: relative;
            z-index: 1;
            text-align: center;
            font-size: 1.5em;
        }

        .fonte-video {
            justify-content: left;
            display: flex;
            top: 92%;
            position: fixed;
            z-index: 1000;
        }

        /* Botões para escolher o vídeo de fundo */
        .video-selector {
            margin-top: 20px;
            z-index: 2;
            position: relative;
            text-align: center;
        }

        .video-btn {
            padding: 10px 20px;
            margin: 10px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            background-color: #444;
            color: white;
            border-radius: 5px;
        }

        .video-btn:hover {
            background-color: #666;
        }
    </style>
</head>
<body>

    <!-- Vídeo de fundo -->
    <video class="background-video" autoplay muted loop id="backgroundVideo">
        <source src="video1.mp4" type="video/mp4" id="videoSource">
        Seu navegador não suporta a tag de vídeo.
    </video>

    <!-- Conteúdo sobre o vídeo -->
    <h1>Bem-vindo ao Meu Site</h1>
    <p>Escolha um vídeo de fundo:</p>

    <!-- Botões para escolher o vídeo -->
    <div class="video-selector">
        <button class="video-btn" onclick="mudarVideo('Clouds_Sky_3840x2160.mp4')">Vídeo 1</button>
        <button class="video-btn" onclick="mudarVideo('x493921_Blowing_Scenery_3840x2160.mp4')">Vídeo 2</button>
        <button class="video-btn" onclick="mudarVideo('x486518_1080p_4k_3840x2160.mp4')">Vídeo 3</button>
    </div>

    <div class="fonte-video">
        <p>Vídeo: <b>Freepik</b></p>
    </div>

    <script>
        // Função para mudar o vídeo de fundo
        function mudarVideo(videoFile) {
            var video = document.getElementById("backgroundVideo");
            var source = document.getElementById("videoSource");
            source.src = videoFile;  // Muda a fonte do vídeo
            video.load();  // Recarrega o vídeo com a nova fonte
            video.play();  // Reproduz o vídeo
        }
    </script>

</body>
</html>
